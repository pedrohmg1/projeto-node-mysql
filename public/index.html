<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-slate-800 p-4 text-white shadow-md mb-8">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold">Painel de Controle</h1>
            
            <div class="relative w-full md:w-80">
                <input type="text" id="campo-pesquisa" oninput="carregarProdutos()" 
                    placeholder="Pesquisar por nome ou categoria..." 
                    class="w-full bg-slate-700 text-sm border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none text-white placeholder-slate-400">
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-5xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h2 id="titulo-form" class="text-sm font-bold text-slate-500 uppercase mb-4">Novo Produto</h2>
            <input type="hidden" id="prod-id">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input id="nome" type="text" placeholder="Nome" class="border p-2 rounded-lg">
                <input id="valor" type="number" placeholder="Preço" class="border p-2 rounded-lg">
                <select id="categoria" class="border p-2 rounded-lg bg-white text-slate-600">
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Alimentos">Alimentos</option>
                    <option value="Vestuário">Vestuário</option>
                    <option value="Outros">Outros</option>
                </select>
                <input id="qtd" type="number" placeholder="Estoque" class="border p-2 rounded-lg">
                <button id="btn-acao" onclick="salvarProduto()" class="bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition">Adicionar</button>
            </div>
            <button id="btn-cancelar" onclick="limparFormulario()" class="hidden text-xs text-gray-400 mt-2 underline">Cancelar edição</button>
        </div>

        <div id="lista-produtos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        let editandoId = null;

        async function carregarProdutos() {
            const termoBusca = document.getElementById('campo-pesquisa').value;
            const res = await fetch(`/produtos?busca=${termoBusca}`);
            const produtos = await res.json();
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';

            if (produtos.length === 0) {
                container.innerHTML = `<p class="text-slate-400 col-span-full text-center py-10">Nenhum produto encontrado.</p>`;
                return;
            }

            produtos.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-bold uppercase px-2 py-1 bg-slate-100 text-slate-600 rounded">${p.categoria}</span>
                                <button onclick="deletarProduto(${p.id})" class="text-red-400 hover:text-red-600 font-bold text-xs p-1">X</button>
                            </div>
                            <h3 class="font-bold text-slate-800">${p.nome}</h3>
                            <p class="text-indigo-600 font-semibold mb-3">R$ ${Number(p.valor).toFixed(2)}</p>
                        </div>
                        <div class="flex items-center justify-between border-t pt-3 mt-auto">
                            <button onclick="prepararEdicao(${p.id}, '${p.nome}', ${p.valor}, '${p.categoria}', ${p.quantidade})" class="text-blue-500 hover:text-blue-700 font-bold text-xs p-1">EDITAR</button>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-slate-500">Qtd: ${p.quantidade}</span>
                                <div class="flex gap-1">
                                    <button onclick="mudarStock(${p.id}, 'diminuir')" class="bg-slate-100 px-2 rounded hover:bg-slate-200">-</button>
                                    <button onclick="mudarStock(${p.id}, 'aumentar')" class="bg-slate-100 px-2 rounded hover:bg-slate-200">+</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function prepararEdicao(id, nome, valor, categoria, qtd) {
            editandoId = id;
            document.getElementById('nome').value = nome;
            document.getElementById('valor').value = valor;
            document.getElementById('categoria').value = categoria;
            document.getElementById('qtd').value = qtd;
            document.getElementById('titulo-form').innerText = "Editando Produto";
            document.getElementById('btn-acao').innerText = "Atualizar";
            document.getElementById('btn-acao').classList.replace('bg-indigo-600', 'bg-orange-500');
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function limparFormulario() {
            editandoId = null;
            document.getElementById('nome').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('qtd').value = '';
            document.getElementById('titulo-form').innerText = "Novo Produto";
            document.getElementById('btn-acao').innerText = "Adicionar";
            document.getElementById('btn-acao').className = "bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        async function salvarProduto() {
            const n = document.getElementById('nome').value;
            const v = document.getElementById('valor').value;
            const c = document.getElementById('categoria').value;
            const q = document.getElementById('qtd').value;
            if(!n || !v) return alert("Preencha Nome e Preço!");
            if (editandoId) {
                await fetch(`/atualizar?id=${editandoId}&nome=${n}&valor=${v}&categoria=${c}&qtd=${q}`);
            } else {
                await fetch(`/adicionar?nome=${n}&valor=${v}&categoria=${c}&qtd=${q}`);
            }
            limparFormulario();
            carregarProdutos();
        }

        async function mudarStock(id, acao) {
            await fetch(`/stock?id=${id}&acao=${acao}`);
            carregarProdutos();
        }

        async function deletarProduto(id) {
            if(confirm("Excluir?")) {
                await fetch(`/deletar/${id}`);
                carregarProdutos();
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
