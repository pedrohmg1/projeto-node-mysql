<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 p-4 text-white shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold text-center">Gestão de Inventário</h1>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-4xl">
        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
            <h2 id="form-title" class="text-lg font-bold mb-4 text-gray-700">Novo Produto</h2>
            <input type="hidden" id="prod-id"> <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="nome" type="text" placeholder="Ex: Teclado" class="border p-2 rounded-lg outline-indigo-500">
                <input id="valor" type="number" placeholder="Preço R$" class="border p-2 rounded-lg outline-indigo-500">
                <button id="btn-salvar" onclick="salvarProduto()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition">
                    Adicionar
                </button>
            </div>
            <button id="btn-cancelar" onclick="limparFormulario()" class="hidden text-sm text-gray-500 mt-2 underline">Cancelar edição</button>
        </div>

        <div id="lista-produtos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        let editando = false;

        async function carregarProdutos() {
            const res = await fetch('/produtos');
            const produtos = await res.json();
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';

            produtos.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-gray-800">${p.nome}</h3>
                            <p class="text-indigo-600 font-medium text-sm">R$ ${Number(p.valor).toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicao(${p.id}, '${p.nome}', ${p.valor})" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition text-sm font-bold">Editar</button>
                            <button onclick="deletarProduto(${p.id})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition text-sm font-bold">Remover</button>
                        </div>
                    </div>
                `;
            });
        }

        function prepararEdicao(id, nome, valor) {
            editando = true;
            document.getElementById('prod-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('valor').value = valor;
            document.getElementById('form-title').innerText = "Editar Produto";
            document.getElementById('btn-salvar').innerText = "Atualizar";
            document.getElementById('btn-salvar').classList.replace('bg-indigo-600', 'bg-orange-500');
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function limparFormulario() {
            editando = false;
            document.getElementById('prod-id').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('form-title').innerText = "Novo Produto";
            document.getElementById('btn-salvar').innerText = "Adicionar";
            document.getElementById('btn-salvar').classList.replace('bg-orange-500', 'bg-indigo-600');
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        async function salvarProduto() {
            const id = document.getElementById('prod-id').value;
            const nome = document.getElementById('nome').value;
            const valor = document.getElementById('valor').value;

            if(!nome || !valor) return alert("Preencha os campos!");

            if (editando) {
                await fetch(`/atualizar?id=${id}&nome=${nome}&valor=${valor}`);
            } else {
                await fetch(`/adicionar?nome=${nome}&valor=${valor}`);
            }

            limparFormulario();
            carregarProdutos();
        }

        async function deletarProduto(id) {
            if(confirm("Deseja realmente remover?")) {
                await fetch(`/deletar/${id}`);
                carregarProdutos();
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
