<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Node + Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Loja Virtual</h1>
            <span class="text-sm">Node.js + MySQL</span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Cadastrar Novo Produto</h2>
            <div class="flex flex-wrap gap-4">
                <input id="nome" type="text" placeholder="Nome do Produto" class="border p-2 rounded flex-1">
                <input id="valor" type="number" placeholder="Preço (R$)" class="border p-2 rounded w-32">
                <button onclick="adicionarProduto()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded transition font-bold">
                    Adicionar
                </button>
            </div>
        </div>

        <h2 class="text-xl font-semibold mb-4 text-gray-700">Produtos em Estoque</h2>
        <div id="lista-produtos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        // Função para buscar produtos da sua API
        async function carregarProdutos() {
            const response = await fetch('/produtos');
            const produtos = await response.json();
            const lista = document.getElementById('lista-produtos');
            lista.innerHTML = '';

            produtos.forEach(p => {
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${p.nome}</p>
                            <p class="text-blue-600 font-semibold text-sm">R$ ${p.valor.toFixed(2)}</p>
                        </div>
                        <button onclick="deletarProduto(${p.id})" class="text-red-500 hover:text-red-700 font-bold">
                            Remover
                        </button>
                    </div>
                `;
            });
        }

        async function adicionarProduto() {
            const nome = document.getElementById('nome').value;
            const valor = document.getElementById('valor').value;
            
            if(!nome || !valor) return alert("Preencha tudo!");

            await fetch(`/adicionar?nome=${nome}&valor=${valor}`);
            carregarProdutos(); // Atualiza a lista
            document.getElementById('nome').value = '';
            document.getElementById('valor').value = '';
        }

        async function deletarProduto(id) {
            await fetch(`/deletar/${id}`);
            carregarProdutos();
        }

        carregarProdutos();
    </script>
</body>
</html>
